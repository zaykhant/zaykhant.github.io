<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ဗေဒင်မေးကြမယ် - Tarot & Birthday</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4376236699081564" crossorigin="anonymous"></script>

    <style>
        :root { --gold: #ffd700; --dark-bg: #0f001a; --glass: rgba(255, 255, 255, 0.1); }
        body { margin: 0; font-family: 'Segoe UI', 'Pyidaungsu', sans-serif; background: radial-gradient(circle at center, #2a004f, #05000a); color: white; min-height: 100vh; overflow-x: hidden; }
        .container { max-width: 500px; margin: auto; padding: 20px; text-align: center; }
        .header h1 { color: var(--gold); text-shadow: 0 0 15px rgba(255, 215, 0, 0.5); font-size: 2rem; margin-bottom: 20px; }
        
        .input-card { background: var(--glass); padding: 20px; border-radius: 20px; border: 1px solid var(--gold); margin-bottom: 20px; backdrop-filter: blur(5px); }
        input[type="date"] { padding: 12px; border-radius: 10px; border: 1px solid var(--gold); background: #1a0033; color: white; width: 80%; font-size: 1rem; margin-top: 10px; }

        .hero-section { position: relative; width: 200px; height: 300px; margin: 0 auto 30px; cursor: pointer; }
        .glowing-card { width: 100%; height: 100%; background: linear-gradient(135deg, #4b0082, #000); border: 2px solid var(--gold); border-radius: 15px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 25px rgba(255, 215, 0, 0.2); animation: float 3s infinite; }

        .actions-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .action-card { background: var(--glass); border: 1px solid rgba(255, 215, 0, 0.3); padding: 15px; border-radius: 15px; cursor: pointer; }

        #draw-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); display: none; z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        .flip-box { perspective: 1000px; width: 280px; height: 450px; }
        .flipper { position: relative; width: 100%; height: 100%; transition: transform 1.2s; transform-style: preserve-3d; }
        .flipper.flipped { transform: rotateY(180deg); }
        .front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 20px; border: 3px solid var(--gold); }
        .front { background: #1a0033; display: flex; align-items: center; justify-content: center; }
        .back { background: white; transform: rotateY(180deg); color: black; display: flex; flex-direction: column; }
        .back img { width: 100%; height: 70%; object-fit: cover; }
        .back-info { padding: 15px; text-align: center; }

        #message-box { display: none; width: 90%; max-width: 400px; background: white; color: #222; padding: 20px; border-radius: 15px; margin-top: 20px; text-align: left; }
        .close-btn { background: var(--gold); border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h1>🔮 ဗေဒင်မေးကြမယ်</h1></div>
    <div class="input-card">
        <label style="color: var(--gold); font-weight: bold;">၁။ သင်၏မွေးနေ့ကို အရင်ရွေးပါ</label><br>
        <input type="date" id="userBirthDate">
    </div>
    <div class="hero-section" onclick="startReading('နေ့စဉ်ကံဇာတာ')">
        <div class="glowing-card"><span style="font-size: 3.5rem;">🎴</span></div>
        <p style="color: var(--gold); font-weight: bold;">၂။ ကတ်ကိုနှိပ်၍ လှန်လိုက်ပါ</p>
    </div>
    <div class="actions-grid">
        <div class="action-card" onclick="startReading('အချစ်ရေး')">❤️ အချစ်ရေး</div>
        <div class="action-card" onclick="startReading('အလုပ်အကိုင်')">💰 အလုပ်အကိုင်</div>
    </div>
</div>

<div id="draw-overlay">
    <div class="flip-box">
        <div id="card-flipper" class="flipper" onclick="handleFlip()">
            <div class="front"><p style="color: gold;">နှိပ်၍ လှန်ပါ</p></div>
            <div class="back">
                <img id="card-img" src="" alt="Tarot">
                <div class="back-info"><h3 id="card-name"></h3></div>
            </div>
        </div>
    </div>
    <div id="message-box">
        <div id="content-area"></div>
        <button class="close-btn" onclick="document.getElementById('draw-overlay').style.display='none'">လက်ခံရရှိပါပြီ</button>
    </div>
</div>

    let currentType = "";
    function startReading(type) {
        if (!document.getElementById('userBirthDate').value) { alert("မွေးနေ့အရင်ရွေးပေးပါဦး။"); return; }
        currentType = type;
        document.getElementById('draw-overlay').style.display = 'flex';
        document.getElementById('card-flipper').classList.remove('flipped');
        document.getElementById('message-box').style.display = 'none';
    }

    function handleFlip() {
        if (document.getElementById('card-flipper').classList.contains('flipped')) return;
        const keys = Object.keys(tarotData);
        const card = tarotData[keys[Math.floor(Math.random() * keys.length)]];
        const day = ["တနင်္ဂနွေ", "တနင်္လာ", "အင်္ဂါ", "ဗုဒ္ဓဟူး", "ကြာသပတေး", "သောကြာ", "စနေ"][new Date(document.getElementById('userBirthDate').value).getDay()];
        
        document.getElementById('card-img').src = card.img;
        document.getElementById('card-name').innerText = "ကံကြမ္မာ";
        document.getElementById('content-area').innerHTML = `<p><b>${day}သားသမီး</b> အတွက် ${currentType}: ${card.message}<br><br><b>💡 အကြံပြုချက်:</b> ${card.tip}</p>`;
        document.getElementById('card-flipper').classList.add('flipped');
        setTimeout(() => document.getElementById('message-box').style.display = 'block', 1200);
    }
</script>
